name: hanyu_tong
description: HanYu_Tong - 面向外国人的中文学习 App
# App 显示名称（在手机桌面上显示的名称）
# 注意：修改 App 名称请同时修改 android/app/src/main/AndroidManifest.xml 中的 android:label

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  provider: ^6.1.2
  # 本地持久化（对应 localStorage）
  shared_preferences: ^2.3.2
  # 路由
  go_router: ^14.3.0
  # 图标
  cupertino_icons: ^1.0.8
  # Windows 桌面窗口管理（控制窗口大小/标题等）
  window_manager: ^0.3.9
  # 录音（支持 Android + Windows + iOS + macOS）
  record: ^5.2.1
  # 权限申请（麦克风等，Android/iOS 使用）
  permission_handler: ^11.3.1
  # 获取临时目录（存放录音文件）
  path_provider: ^2.1.4
  # Edge TTS（微软在线语音合成，中文发音质量高）
  edge_tts: ^0.1.4
  # 音频播放器（播放 TTS 返回的 MP3 数据）
  audioplayers: ^6.1.0
  # 国际化支持（必须放在 dependencies 以便 Release/真机构建可用）
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  # HTTP 客户端（调用通义千问 API）
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  # ARB文件生成工具（可选，用于开发时快速生成）
  # flutter_localizations_utils: ^0.4.0

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/words/
    - assets/idioms/
    - assets/proverb_saying/
    - assets/poetry/
    - assets/culture/
    - assets/grammar/en/hsk1_2/
    - assets/grammar/en/hsk3/
    - assets/grammar/en/hsk4/
    - assets/grammar/en/hsk5_6/
    - assets/grammar/ru/hsk1_2/
    - assets/grammar/ru/hsk3/
    - assets/grammar/ru/hsk4/
    - assets/grammar/ru/hsk5_6/
    - assets/grammar/tr/hsk1_2/
    - assets/grammar/tr/hsk3/
    - assets/grammar/tr/hsk4/
    - assets/grammar/tr/hsk5_6/
    - assets/grammar/ar/hsk1_2/
    - assets/grammar/ar/hsk3/
    - assets/grammar/ar/hsk4/
    - assets/grammar/ar/hsk5_6/
    - assets/grammar/fa/hsk1_2/
    - assets/grammar/fa/hsk3/
    - assets/grammar/fa/hsk4/
    - assets/grammar/fa/hsk5_6/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

